name: Update PL Dashboard

on:
  schedule:
    - cron: '*/5 * 11-30 6 *'
    - cron: '*/5 * 1-19 7 *'
    - cron: '*/5 10-23 * * 0,6'
    - cron: '*/5 17-23 * * 1-5'
    - cron: '*/10 13-16 * * 5'
    - cron: '0 8,14 * * 1-5'
    - cron: '0 8 * * 0,6'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Check if update needed (PL + La Liga + World Cup)
        id: check
        run: |
          python3 << 'PYEOF'
          import requests, os, subprocess, datetime

          is_manual = os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch"
          FPL = "https://fantasy.premierleague.com/api"
          ESPN_SB = "https://site.api.espn.com/apis/site/v2/sports/soccer/esp.1/scoreboard"
          ESPN_WC_SB = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard"
          FIFA_WC_MATCHES = "https://api.fifa.com/api/v3/calendar/matches"
          HDR = {"User-Agent": "PL-Dashboard/1.0"}
          output_file = os.environ.get("GITHUB_OUTPUT", "/dev/null")

          def write_output(value):
              with open(output_file, "a") as f:
                  f.write("should_update=" + str(value) + "\n")

          pl_live = 0
          ll_live = 0
          wc_live = 0
          wc_live_fifa = 0
          now = datetime.datetime.now(datetime.timezone.utc)

          try:
              fx = requests.get(f"{FPL}/fixtures/", headers=HDR, timeout=15).json()
              pl_live = len([f for f in fx if f.get("started") and not f.get("finished")])
              if pl_live:
                  print(f"PL LIVE: {pl_live} matches in progress")
          except Exception as e:
              print(f"PL check failed ({e}) - will update as precaution")
              write_output("true")
              raise SystemExit(0)

          try:
              today = now.strftime("%Y%m%d")
              espn = requests.get(ESPN_SB, params={"dates": today, "limit": "50"}, headers=HDR, timeout=15).json()
              for ev in espn.get("events", []):
                  for comp in ev.get("competitions", []):
                      state = comp.get("status", {}).get("type", {}).get("state", "pre")
                      if state == "in":
                          ll_live += 1
              if ll_live:
                  print(f"La Liga LIVE: {ll_live} matches in progress")
          except Exception as e:
              print(f"La Liga check failed ({e}) - ignoring")

          try:
              today = now.strftime("%Y%m%d")
              wc = requests.get(ESPN_WC_SB, params={"dates": today, "limit": "50"}, headers=HDR, timeout=15).json()
              for ev in wc.get("events", []):
                  for comp in ev.get("competitions", []):
                      state = comp.get("status", {}).get("type", {}).get("state", "pre")
                      if state == "in":
                          wc_live += 1
              if wc_live:
                  print(f"World Cup LIVE: {wc_live} matches in progress")
          except Exception as e:
              print(f"World Cup check failed ({e}) - ignoring")

          try:
              fifa_wc = requests.get(FIFA_WC_MATCHES, params={
                  "language": "en",
                  "count": "120",
                  "idCompetition": "17",
                  "idSeason": "285023",
              }, headers=HDR, timeout=15).json()
              wc_live_fifa = len([
                  m for m in fifa_wc.get("Results", [])
                  if str(m.get("MatchStatus", "")) == "3"
              ])
              if wc_live_fifa:
                  print(f"World Cup FIFA LIVE: {wc_live_fifa} matches in progress")
          except Exception as e:
              print(f"World Cup FIFA check failed ({e}) - ignoring")

          if is_manual:
              print("Manual trigger - always updating")
              write_output("true")
              raise SystemExit(0)

          total_live = pl_live + ll_live + max(wc_live, wc_live_fifa)
          if total_live:
              print(f"TOTAL LIVE: {total_live} - updating")
              write_output("true")
              raise SystemExit(0)

          result = subprocess.run(
              ["git", "log", "-1", "--format=%ct", "--", "index.html"],
              capture_output=True, text=True
          )
          last_ts = int(result.stdout.strip()) if result.stdout.strip() else 0
          now_ts = datetime.datetime.now(datetime.timezone.utc).timestamp()
          age_hours = (now_ts - last_ts) / 3600

          if age_hours > 3:
              print(f"Last update was {age_hours:.1f}h ago - refreshing")
              write_output("true")
          else:
              print(f"No live matches, last update {age_hours:.1f}h ago - skipping")
              write_output("false")
          PYEOF

      - name: Build dashboard
        if: steps.check.outputs.should_update == 'true'
        run: python website/update_pl_mobile.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}

      - name: Commit and push if changed
        if: steps.check.outputs.should_update == 'true'
        run: |
          cp -f website/pl_mobile.html index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html live.json learning_history.json ai_weights.json ai_predictions_wc.json ai_weights_wc.json 2>/dev/null || git add index.html live.json
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Auto-update dashboard data"
            git pull --rebase --autostash origin main || true
            git push origin main || (git pull --rebase --autostash origin main && git push origin main)
            echo "Deployed successfully"
          fi

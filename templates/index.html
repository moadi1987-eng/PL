<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PL Dashboard - Premier League Analyzer</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#37003c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Top Navigation -->
<nav class="navbar navbar-dark sticky-top" id="mainNav">
    <div class="container-fluid px-3">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="/static/pl-logo.png" alt="PL" class="navbar-logo me-2" id="navLogo">
            <span class="brand-text" id="brandText">PL Dashboard</span>
            <span class="live-badge d-none" id="liveBadge">LIVE</span>
        </a>
        <div class="league-toggle ms-auto" id="leagueToggle">
            <button class="league-btn active" data-league="pl" title="Premier League">PL</button>
            <button class="league-btn" data-league="laliga" title="La Liga">LL</button>
        </div>
    </div>
</nav>

<!-- Global Gameweek Selector (applies to all tabs) -->
<div class="global-gw-bar">
    <div class="container-fluid px-3 py-2">
        <div class="gw-selector">
            <button class="btn btn-sm btn-gw-nav" id="gwPrev" title="Previous gameweek"><i class="bi bi-chevron-left"></i></button>
            <div class="gw-pills-wrapper" id="gwPills"></div>
            <button class="btn btn-sm btn-gw-nav" id="gwNext" title="Next gameweek"><i class="bi bi-chevron-right"></i></button>
            <button class="btn btn-sm btn-gw-today d-none" id="gwToday" title="Jump to current gameweek"><i class="bi bi-record-circle"></i></button>
        </div>
    </div>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-container">
        <div class="spinner-border text-light" role="status" style="width:3rem;height:3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="text-light mt-3 fw-500" id="loadingText">Loading data...</p>
    </div>
</div>

<!-- ======================== RESULTS + TABLE (unified) ======================== -->
<section id="tab-results" class="tab-content active">
    <div class="container-fluid px-3 py-3">
        <div class="row g-3 results-and-table">
            <div class="col-12 col-lg-9 order-2 order-lg-1">
                <h4 class="section-title mb-2"><i class="bi bi-list-ol me-2"></i>League Table</h4>
                <div class="table-responsive">
                    <table class="table table-standings" id="standingsTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Team</th>
                                <th>P</th>
                                <th>W</th>
                                <th>D</th>
                                <th>L</th>
                                <th class="d-none d-sm-table-cell">GF</th>
                                <th class="d-none d-sm-table-cell">GA</th>
                                <th>GD</th>
                                <th>Pts</th>
                                <th class="d-none d-md-table-cell">Form</th>
                            </tr>
                        </thead>
                        <tbody id="standingsBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="col-12 col-lg-3 order-1 order-lg-2">
                <h4 class="section-title mb-2"><i class="bi bi-calendar-check me-2"></i>Results</h4>
                <div id="fixturesContainer" class="row g-3"></div>
            </div>
        </div>
    </div>
</section>

<!-- ======================== COMPARE TAB ======================== -->
<section id="tab-compare" class="tab-content">
    <div class="container-fluid px-3 py-3">
        <h4 class="section-title mb-3"><i class="bi bi-arrow-left-right me-2"></i>Team Comparison</h4>

        <p class="text-muted small mb-2">Tap two team badges to compare:</p>
        <div class="team-badges-grid mb-3" id="teamBadgesGrid"></div>

        <!-- Selected teams display -->
        <div class="compare-selection mb-3 d-none" id="compareSelection">
            <div class="compare-sel-team" id="compareSel1">
                <img src="" alt="">
                <span></span>
            </div>
            <span class="vs-badge">VS</span>
            <div class="compare-sel-team" id="compareSel2">
                <img src="" alt="">
                <span></span>
            </div>
        </div>

        <div class="text-center mb-3">
            <label class="form-label small text-muted">Matchweeks to compare:</label>
            <div class="btn-group ms-2" id="comparePeriod">
                <button class="btn btn-sm btn-outline-pl" data-n="3">3</button>
                <button class="btn btn-sm btn-outline-pl active" data-n="5">5</button>
                <button class="btn btn-sm btn-outline-pl" data-n="10">10</button>
            </div>
        </div>

        <div id="compareResult" class="d-none"></div>
    </div>
</section>

<!-- ======================== GUESS TAB ======================== -->
<section id="tab-guess" class="tab-content">
    <div class="container-fluid px-3 py-3">
        <div class="guess-sticky-header">
            <div class="d-flex align-items-center justify-content-between mb-2 flex-wrap gap-2">
                <h4 class="section-title mb-0"><i class="bi bi-bullseye me-2"></i>Guess the Results</h4>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-info" id="btnAutoFill" title="Auto-fill empty guesses with AI predictions">
                        <i class="bi bi-magic me-1"></i>AI Fill
                    </button>
                    <button class="btn btn-sm btn-outline-danger" id="btnRandomFill" title="Fill all with random scores">
                        <i class="bi bi-shuffle me-1"></i>Random
                    </button>
                    <button class="btn btn-sm btn-guess-advice" id="btnGetAdvice" title="Get AI advice">
                        <i class="bi bi-lightbulb-fill me-1"></i>Advice
                    </button>
                </div>
            </div>

            <!-- Status bar -->
            <div class="guess-status-bar mb-2" id="guessStatusBar">
                <span class="guess-status-text" id="guessStatusText">Fill in your guesses below</span>
                <button class="btn btn-sm btn-save-guesses d-none" id="btnSaveGuesses">
                    <i class="bi bi-check-lg me-1"></i>Save Guesses
                </button>
            </div>

            <!-- Sub-tabs: Fill Guesses / You vs AI -->
            <div class="guess-subtabs">
                <button class="guess-subtab active" data-subtab="fill">
                    <i class="bi bi-pencil-fill me-1"></i>Fill Guesses
                </button>
                <button class="guess-subtab" data-subtab="compare">
                    <i class="bi bi-people-fill me-1"></i>You vs AI
                </button>
            </div>
        </div>

        <!-- Guess cards + History -->
        <div id="guessFillSection">
            <div id="guessCardsContainer" class="row g-3 mb-4"></div>
            <div class="mt-4">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <h5 class="section-title mb-0"><i class="bi bi-clock-history me-2"></i>My History</h5>
                </div>
                <div id="guessHistoryContainer"></div>
            </div>
        </div>

        <!-- You vs AI section -->
        <div id="guessCompareSection" class="d-none">
            <div id="bestBetsScoreContainer" class="mb-4"></div>
            <div id="comparisonContainer"></div>
        </div>
    </div>
</section>

<!-- Bottom Tab Bar -->
<nav class="tab-bar" id="tabBar">
    <a class="tab-bar-link active" href="#" data-tab="results">
        <i class="bi bi-calendar-check"></i><span>Results</span>
    </a>
    <a class="tab-bar-link" href="#" data-tab="guess">
        <i class="bi bi-bullseye"></i><span>Guess</span>
    </a>
    <a class="tab-bar-link" href="#" data-tab="compare">
        <i class="bi bi-arrow-left-right"></i><span>Compare</span>
    </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>

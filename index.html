<title>PL Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--p:#37003c;--pl:#590060;--g:#00ff87;--pk:#e90052;--cy:#04f5ff;--dk:#1a0a1f;--cd:#2a1230;--ch:#3a1a42;--bd:rgba(255,255,255,.08);--tx:#f0eaf2;--tm:#a89aad;--r:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--dk);color:var(--tx);min-height:100vh;padding-bottom:64px;-webkit-font-smoothing:antialiased}
.topbar{background:linear-gradient(135deg,var(--p),#1a0025);border-bottom:2px solid var(--g);padding:.5rem .75rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.brand{font-weight:800;font-size:1.05rem;background:linear-gradient(90deg,var(--g),var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.upd{font-size:.5rem;color:var(--tm)}
.gwbar{display:flex;align-items:center;gap:.3rem;padding:.35rem .5rem;background:var(--cd);border-bottom:1px solid var(--bd);position:sticky;top:37px;z-index:90}
.gwbtn{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.06);color:var(--tx);font-size:.8rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.gwbtn:active{background:var(--g);color:var(--p)}
.gwscr{display:flex;gap:.25rem;overflow-x:auto;flex:1;scrollbar-width:none;-webkit-overflow-scrolling:touch}.gwscr::-webkit-scrollbar{display:none}
.gp{border:none;background:rgba(255,255,255,.06);color:var(--tm);font-size:.65rem;font-weight:700;padding:.25rem .55rem;border-radius:20px;white-space:nowrap;cursor:pointer;flex-shrink:0}.gp.a{background:var(--g);color:var(--p)}.gp.cur{}
.gp.nxt{border:2px solid gold}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--p);border-top:1px solid var(--bd);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;padding:.4rem 0 .25rem;text-align:center;color:var(--tm);font-size:.5rem;font-weight:600;border:none;background:none;cursor:pointer}.nb.a{color:var(--g)}.nb svg{width:20px;height:20px;display:block;margin:0 auto 1px}
.stabs{display:flex;gap:.25rem;background:var(--cd);border-radius:var(--r);padding:.2rem;margin-bottom:.5rem;position:sticky;top:70px;z-index:50}
.stab{flex:1;padding:.3rem .2rem;border:none;border-radius:var(--rs);background:transparent;color:var(--tm);font-weight:600;font-size:.6rem;cursor:pointer;text-align:center}.stab.a{background:var(--g);color:var(--p)}
.tab{display:none;padding:.5rem}.tab.a{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.4}}
.emp{text-align:center;padding:1.2rem;color:var(--tm);font-size:.7rem}
.sec{font-size:.88rem;font-weight:700;margin-bottom:.35rem}.dsc{font-size:.56rem;color:var(--tm);margin-bottom:.4rem}
/* Match card */
.mc{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:.55rem;margin-bottom:.35rem;position:relative}
.mc.live{border-color:rgba(233,0,82,.3)}
.mr{display:flex;align-items:center;justify-content:space-between;gap:.2rem}
.mt{display:flex;align-items:center;gap:.3rem;flex:1;min-width:0}.mt.aw{flex-direction:row-reverse;text-align:right}
.mt img{width:24px;height:24px;object-fit:contain}.mt span{font-weight:600;font-size:.75rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msc{font-size:1.1rem;font-weight:800;min-width:50px;text-align:center;flex-shrink:0}
.mko{font-size:.5rem;color:var(--tm);text-align:center;margin-top:.1rem}
.ldot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--pk);margin-right:3px;animation:lp 1.2s infinite}
.labs{position:absolute;top:4px;right:5px;background:var(--pk);color:#fff;font-size:.46rem;font-weight:800;padding:1px 5px;border-radius:10px;display:flex;align-items:center;gap:2px;animation:lp 1.5s infinite}
.fabs{position:absolute;top:4px;right:5px;font-size:.46rem;font-weight:700;color:var(--tm);background:rgba(255,255,255,.06);padding:1px 5px;border-radius:10px}
/* Table */
.tw{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:.65rem;white-space:nowrap}
.tbl th{color:var(--tm);font-weight:600;padding:.3rem .15rem;border-bottom:1px solid var(--bd);text-align:left;background:var(--p);position:sticky;top:0;z-index:2;font-size:.55rem;text-transform:uppercase}
.tbl td{padding:.25rem .15rem;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
.tbl .pch{color:var(--g);font-weight:700}.tbl .pcl{color:var(--cy);font-weight:700}.tbl .prl{color:var(--pk);font-weight:700}.tbl .pts{font-weight:800;color:var(--g);font-size:.8rem;text-shadow:0 0 6px rgba(0,255,135,.3)}
.tc{display:flex;align-items:center;gap:3px}.tc img{width:15px;height:15px;object-fit:contain}
.fd{display:inline-block;width:14px;height:14px;border-radius:3px;font-size:.45rem;font-weight:700;text-align:center;line-height:14px;color:#fff;margin-left:1px}.fd.W{background:var(--g);color:var(--p)}.fd.D{background:#6c757d}.fd.L{background:var(--pk)}
/* Pred card */
.pc{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:.5rem;margin-bottom:.35rem;position:relative}.pc.tb{border-color:rgba(245,166,35,.3)}
.tbg{background:linear-gradient(90deg,#f5a623,#e85a2a,var(--pk));color:#fff;font-size:.46rem;font-weight:800;padding:1px 5px;border-radius:10px;position:absolute;top:4px;right:4px}
.pb{display:flex;border-radius:7px;overflow:hidden;height:19px;font-size:.5rem;font-weight:700;margin-bottom:.2rem}
.pb div{display:flex;align-items:center;justify-content:center;min-width:24px;color:#fff}.pbh{background:var(--g);color:var(--p)}.pbd{background:#6c757d}.pba{background:var(--cy);color:var(--p)}
.psc{text-align:center;font-size:.65rem;color:var(--tm)}.psc b{color:var(--tx)}
.adv{background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.2);border-radius:var(--rs);padding:.18rem .35rem;font-size:.55rem;color:#ffc107;display:flex;align-items:center;gap:.2rem;margin-top:.18rem;cursor:pointer}
.adv svg{width:10px;height:10px;fill:#ffc107;flex-shrink:0}
.adv .why{margin-left:auto;width:18px;height:18px;border-radius:50%;border:1.5px solid #f5a623;background:rgba(245,166,35,.12);color:#f5a623;display:flex;align-items:center;justify-content:center;font-size:.6rem;flex-shrink:0}
/* Best bets table */
.bb{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:.45rem;margin-top:.4rem}
.bb h5{font-size:.75rem;font-weight:700;margin-bottom:.25rem}
.bb table{width:100%;font-size:.52rem;border-collapse:collapse}
.bb th{background:var(--p);color:var(--tm);font-weight:600;padding:.2rem;border:none;text-align:left}
.bb td{padding:.18rem .2rem;border-bottom:1px solid var(--bd);vertical-align:middle}
.bb .sm{background:rgba(0,255,135,.08);font-weight:700}.bb .sm td{border:none}
.ok{color:var(--g);font-weight:700}.nk{color:var(--pk);font-weight:700}
/* Guess card */
.gc{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:.5rem;margin-bottom:.35rem;position:relative}
.gc.has{border-color:rgba(0,255,135,.2)}.gc.rok{border-left:3px solid var(--g)}.gc.rbad{border-left:3px solid var(--pk)}.gc.rex{border-left:3px solid gold}
.rb{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700}
.rb.rc{background:var(--g);color:var(--p)}.rb.rw{background:var(--pk);color:#fff}.rb.re{background:gold;color:var(--p)}
.wb{display:flex;gap:.2rem;margin:.25rem 0}
.wn{flex:1;border:2px solid var(--bd);background:transparent;color:var(--tm);font-size:.6rem;font-weight:600;padding:.25rem 0;border-radius:var(--rs);cursor:pointer;text-align:center}.wn:active{transform:scale(.97)}
.wn.sh{background:var(--g);color:var(--p);border-color:var(--g)}.wn.sd{background:#6c757d;color:#fff;border-color:#6c757d}.wn.sa{background:var(--cy);color:var(--p);border-color:var(--cy)}
.si{display:flex;align-items:center;justify-content:center;gap:.3rem}
.si input{width:38px;height:32px;text-align:center;border:2px solid var(--bd);background:rgba(255,255,255,.05);color:var(--tx);border-radius:var(--rs);font-size:.8rem;font-weight:800;outline:none}.si input:focus{border-color:var(--g)}
.act{text-align:center;font-size:.55rem;color:var(--tm);margin-top:.15rem}.act b{color:var(--tx)}
.psum{background:linear-gradient(135deg,rgba(0,255,135,.06),rgba(4,245,255,.04));border:1px solid rgba(0,255,135,.15);border-radius:var(--r);padding:.35rem;margin-bottom:.35rem;text-align:center;font-size:.65rem}.psum b{color:var(--g)}
/* You vs AI scoreboard */
.csb{display:flex;gap:.4rem;margin-bottom:.5rem}
.csc{flex:1;background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:.5rem;text-align:center}
.csc.win{border-color:var(--g);box-shadow:0 0 10px rgba(0,255,135,.1)}
.csc .cw{font-weight:700;font-size:.7rem;margin-bottom:.3rem}.csc .cp{font-size:1.4rem;font-weight:800}.csc .cd{font-size:.55rem;color:var(--tm);margin-top:.2rem}
/* Comparison match card */
.ccrd{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:.45rem;margin-bottom:.3rem;font-size:.65rem}
.ccrd .cmatch{font-weight:700;margin-bottom:.3rem;display:flex;align-items:center;gap:3px}.cmatch img{width:14px;height:14px}
.cblk{margin-top:.3rem;padding-top:.3rem;border-top:1px solid var(--bd)}.cblk:first-of-type{margin-top:0;padding-top:0;border-top:none}
.cblk .cbt{font-size:.5rem;text-transform:uppercase;color:var(--tm);font-weight:700;margin-bottom:.2rem}
.crow{padding:.1rem 0;font-size:.6rem}.crow .cl{color:var(--tm);margin-right:.3rem;min-width:2rem;display:inline-block}
/* Compare teams */
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:.3rem;margin-bottom:.5rem}
.bpick{display:flex;flex-direction:column;align-items:center;gap:2px;padding:.3rem .1rem;border-radius:var(--rs);border:2px solid transparent;background:var(--cd);cursor:pointer}
.bpick img{width:28px;height:28px;object-fit:contain}.bpick span{font-size:.45rem;font-weight:600;color:var(--tm);text-align:center}
.bpick.s1{border-color:var(--g);background:rgba(0,255,135,.06)}.bpick.s1 span{color:var(--g)}
.bpick.s2{border-color:var(--cy);background:rgba(4,245,255,.06)}.bpick.s2 span{color:var(--cy)}
.csel{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.4rem;background:var(--cd);border-radius:var(--r);border:1px solid var(--bd);margin-bottom:.4rem}
.csel img{width:28px;height:28px;object-fit:contain}.csel .cn{font-weight:700;font-size:.75rem}
.vsbg{background:var(--pl);color:var(--g);font-weight:800;font-size:.65rem;padding:.2rem .5rem;border-radius:16px}
.sbar{display:flex;align-items:center;gap:.3rem;margin-bottom:.4rem;font-size:.65rem}
.sbar .sv{font-weight:700;min-width:24px;text-align:center}.sv.better{color:var(--g)}
.sbar .sl{font-size:.5rem;text-transform:uppercase;color:var(--tm);text-align:center;min-width:56px}
.sbar .sbc{flex:1;height:7px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.sbar .sb{height:100%;border-radius:3px}.sb.t1{background:var(--g);float:right}.sb.t2{background:var(--cy);float:left}
.fmr{display:flex;align-items:center;gap:.3rem;padding:.25rem 0;font-size:.6rem;border-bottom:1px solid var(--bd)}.fmr:last-child{border:none}
.fmr .fgl{color:var(--tm);font-size:.5rem;min-width:26px}
/* History */
.hc{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:.35rem .5rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:.25rem;cursor:pointer}
.hc .hg{font-weight:700;font-size:.7rem;min-width:40px}
.hc .hs{display:flex;gap:.4rem;font-size:.6rem}.hs .hn{font-weight:700;display:block}.hs .hl{font-size:.45rem;color:var(--tm)}
.hc .hp{font-weight:800;font-size:.85rem;color:var(--g);min-width:34px;text-align:right}
.htot{background:var(--cd);border:2px solid var(--g);border-radius:var(--r);padding:.35rem .5rem;display:flex;align-items:center;justify-content:space-between;margin-top:.35rem}
.htot .hl{font-weight:700;color:var(--g);font-size:.75rem}.htot .hp{font-weight:800;font-size:1rem;color:var(--g)}
/* Reasoning modal */
.rov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;display:flex;align-items:center;justify-content:center;padding:.5rem;opacity:0;transition:opacity .2s;pointer-events:none}
.rov.show{opacity:1;pointer-events:auto}
.rpop{background:var(--cd);border:1px solid rgba(245,166,35,.3);border-radius:var(--r);width:100%;max-width:360px;max-height:80vh;overflow-y:auto;transform:translateY(15px);transition:transform .2s}
.rov.show .rpop{transform:none}
.rhead{display:flex;align-items:center;justify-content:space-between;padding:.5rem .6rem;border-bottom:1px solid var(--bd);font-weight:700;font-size:.75rem}
.rclose{background:none;border:none;color:var(--tm);font-size:.9rem;cursor:pointer;padding:2px}
.rbody{padding:.5rem .6rem}
.rsub{font-size:.55rem;text-transform:uppercase;color:var(--tm);margin-bottom:.4rem}
.rrow{display:flex;align-items:flex-start;gap:.4rem;padding:.3rem 0;border-bottom:1px solid var(--bd);font-size:.65rem;line-height:1.4}
.rrow:last-child{border:none;font-weight:700;color:var(--g)}
.ricon{color:#f5a623;font-size:.7rem;flex-shrink:0;margin-top:1px}
</style>
</head>

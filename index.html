<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#37003c">
<title>PL Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--p:#37003c;--pl:#590060;--g:#00ff87;--pk:#e90052;--cy:#04f5ff;--dk:#1a0a1f;--cd:#2a1230;--ch:#3a1a42;--bd:rgba(255,255,255,.08);--tx:#f0eaf2;--tm:#a89aad;--r:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--dk);color:var(--tx);min-height:100vh;padding-bottom:64px;-webkit-font-smoothing:antialiased}
.topbar{background:linear-gradient(135deg,var(--p),#1a0025);border-bottom:2px solid var(--g);padding:.5rem .75rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:.4rem}
.ltog{display:flex;gap:1px;background:rgba(255,255,255,.08);border-radius:14px;padding:1px;flex-shrink:0}
.lb{border:none;background:transparent;color:rgba(255,255,255,.4);font-weight:700;font-size:.55rem;padding:.2rem .45rem;border-radius:13px;cursor:pointer}.lb.a{background:var(--g);color:var(--p)}
.upd{margin-left:auto}
.brand{font-weight:800;font-size:1.05rem;background:linear-gradient(90deg,var(--g),var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.upd{font-size:.5rem;color:var(--tm);cursor:pointer;user-select:none}
.gwbar{display:flex;align-items:center;gap:.3rem;padding:.35rem .5rem;background:var(--cd);border-bottom:1px solid var(--bd);position:sticky;top:37px;z-index:90}
.gwbtn{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.06);color:var(--tx);font-size:.8rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.gwbtn:active{background:var(--g);color:var(--p)}
.gwbtn-today{border:1px solid rgba(233,0,82,.4);background:rgba(233,0,82,.12);color:#e90052;border-radius:16px;padding:.2rem .55rem;font-size:.6rem;font-weight:700;white-space:nowrap;flex-shrink:0;cursor:pointer}
.gwbtn-today:active{background:#e90052;color:#fff}
.seasonSel{display:none;border:1px solid var(--bd);background:rgba(255,255,255,.06);color:var(--tx);border-radius:14px;padding:.24rem .42rem;font-size:.58rem;font-weight:800;outline:none;max-width:86px;flex-shrink:0;cursor:pointer}
.seasonSel option{background:var(--cd);color:var(--tx)}
.gwscr{display:flex;gap:.25rem;overflow-x:auto;flex:1;scrollbar-width:none;-webkit-overflow-scrolling:touch}.gwscr::-webkit-scrollbar{display:none}
.gp{border:none;background:rgba(255,255,255,.06);color:var(--tm);font-size:.65rem;font-weight:700;padding:.25rem .55rem;border-radius:20px;white-space:nowrap;cursor:pointer;flex-shrink:0}.gp.a{background:var(--g);color:var(--p)}.gp.cur{}
.gp.nxt{border:2px solid gold}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--p);border-top:1px solid var(--bd);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;padding:.4rem 0 .25rem;text-align:center;color:var(--tm);font-size:.5rem;font-weight:600;border:none;background:none;cursor:pointer}.nb.a{color:var(--g)}.nb svg{width:20px;height:20px;display:block;margin:0 auto 1px}
.stabs{display:flex;gap:.25rem;background:var(--cd);border-radius:var(--r);padding:.2rem;margin-bottom:.5rem;position:sticky;top:70px;z-index:50}
.stab{flex:1;padding:.3rem .2rem;border:none;border-radius:var(--rs);background:transparent;color:var(--tm);font-weight:600;font-size:.6rem;cursor:pointer;text-align:center}.stab.a{background:var(--g);color:var(--p)}
.tab{display:none;padding:.5rem}.tab.a{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.4}}
.emp{text-align:center;padding:1.2rem;color:var(--tm);font-size:.7rem}
.sec{font-size:.88rem;font-weight:700;margin-bottom:.35rem}.dsc{font-size:.56rem;color:var(--tm);margin-bottom:.4rem}
/* Match card */
.mc{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:.55rem;margin-bottom:.35rem;position:relative}
.mc.live{border-color:rgba(233,0,82,.3)}
.mr{display:flex;align-items:center;justify-content:space-between;gap:.2rem}
.mt{display:flex;align-items:center;gap:.3rem;flex:1;min-width:0}.mt.aw{flex-direction:row-reverse;text-align:right}
.mt img{width:24px;height:24px;object-fit:contain}.mt span{font-weight:600;font-size:.75rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msc{font-size:1.1rem;font-weight:800;min-width:50px;text-align:center;flex-shrink:0}
.mko{font-size:.5rem;color:var(--tm);text-align:center;margin-top:.1rem}
.phase{font-size:.48rem;color:var(--cy);text-align:center;margin-top:.14rem;font-weight:800;text-transform:uppercase;letter-spacing:.02em}
.ldot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--pk);margin-right:3px;animation:lp 1.2s infinite}
.clk{font-variant-numeric:tabular-nums;letter-spacing:.5px}.clk-s{font-size:.6em;opacity:.7}
.labs{position:absolute;top:4px;right:5px;background:var(--pk);color:#fff;font-size:.46rem;font-weight:800;padding:1px 5px;border-radius:10px;display:flex;align-items:center;gap:2px;animation:lp 1.5s infinite}
.fabs{position:absolute;top:4px;right:5px;font-size:.46rem;font-weight:700;color:var(--tm);background:rgba(255,255,255,.06);padding:1px 5px;border-radius:10px}
/* World Cup knockout bracket */
.wcb-scroll{position:relative;overflow-x:auto;overflow-y:hidden;overscroll-behavior-x:contain;margin:.3rem 0 4.5rem;padding:.2rem 0 .55rem;max-width:100%;border:1px solid var(--bd);border-radius:6px;background:var(--dk)}
.wcb-canvas{position:relative;width:1240px;min-width:1240px;height:680px;padding:.45rem;margin-inline:auto;box-sizing:border-box}
.wcb-lines{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.wcb-line{fill:none;stroke:rgba(255,255,255,.18);stroke-width:2;vector-effect:non-scaling-stroke}
.wcb-line.confirmed{stroke:var(--g);stroke-width:2.5}.wcb-line.loser{stroke:var(--cy);stroke-dasharray:5 5}
.wcb-grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(4,125px) 140px repeat(4,125px);grid-template-rows:28px repeat(8,70px);column-gap:10px;row-gap:7px;height:100%}
.wcb-head{align-self:center;text-align:center;color:var(--tm);font-size:.5rem;font-weight:800;text-transform:uppercase;white-space:nowrap}
.wcb-slot{align-self:center;min-width:0}.wcb-card{height:58px;min-width:0;background:var(--cd);border:1px solid var(--bd);border-radius:6px;padding:.25rem .3rem;box-sizing:border-box;overflow:hidden}
.wcb-card.live{border-color:var(--pk);box-shadow:inset 3px 0 var(--pk)}.wcb-card.finished{border-color:rgba(42,223,127,.35)}
.wcb-stage{display:flex;justify-content:space-between;gap:.25rem;color:var(--tm);font-size:.42rem;line-height:1;margin-bottom:.2rem}
.wcb-team{display:grid;grid-template-columns:15px minmax(0,1fr) auto;align-items:center;gap:.22rem;height:19px;font-size:.52rem;font-weight:700;color:var(--tx)}
.wcb-team img{width:15px;height:15px;object-fit:contain}.wcb-team span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.wcb-team b{font-size:.58rem}
.wcb-team.winner{color:var(--g)}.wcb-team.placeholder{color:var(--tm);font-weight:600}
.wcb-trophy{grid-column:5;grid-row:6;align-self:center;justify-self:center;width:52px;height:auto;z-index:2;pointer-events:none;filter:drop-shadow(0 0 8px rgba(255,197,61,.38))}
.wcb-empty{padding:.75rem;border:1px solid var(--bd);border-radius:6px;color:var(--tm);text-align:center;font-size:.62rem}
@media(max-width:700px){.wcb-scroll{margin-left:0;margin-right:0}.wcb-canvas{height:660px}.wcb-card{height:56px}.wcb-trophy{width:46px}}
/* Table */
.tw{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:.65rem;white-space:nowrap}
.tbl th{color:var(--tm);font-weight:600;padding:.3rem .15rem;border-bottom:1px solid var(--bd);text-align:left;background:var(--p);position:sticky;top:0;z-index:2;font-size:.55rem;text-transform:uppercase}
.tbl td{padding:.25rem .15rem;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
.tbl .pch{color:var(--g);font-weight:700}.tbl .pcl{color:var(--cy);font-weight:700}.tbl .prl{color:var(--pk);font-weight:700}.tbl .pts{font-weight:800;color:var(--g);font-size:.8rem;text-shadow:0 0 6px rgba(0,255,135,.3)}
.tc{display:flex;align-items:center;gap:3px}.tc img{width:15px;height:15px;object-fit:contain}
.fd{display:inline-block;width:14px;height:14px;border-radius:3px;font-size:.45rem;font-weight:700;text-align:center;line-height:14px;color:#fff;margin-left:1px}.fd.W{background:var(--g);color:var(--p)}.fd.D{background:#6c757d}.fd.L{background:var(--pk)}
.tbl tr.live-row{background:rgba(233,0,82,.045)}
.tbl tr.live-row td:first-child{box-shadow:inset 2px 0 var(--cy)}
.tbl tr.live-win td:first-child{box-shadow:inset 2px 0 var(--g)}
.tbl tr.live-loss td:first-child{box-shadow:inset 2px 0 var(--pk)}
.tlive-note{display:inline-flex;align-items:center;gap:3px;margin-left:.3rem;color:var(--pk);font-size:.5rem;font-weight:900;vertical-align:middle}
.tmove{display:inline-flex;align-items:center;justify-content:center;min-width:16px;margin-left:3px;font-size:.55rem;font-weight:900}
.tmove.up{color:var(--g)}.tmove.down{color:var(--pk)}
.tlive-score{display:inline-flex;align-items:center;border-radius:999px;padding:1px 6px;margin-left:4px;font-size:.52rem;font-weight:900;font-variant-numeric:tabular-nums;line-height:1.25}
.tlive-score.win{background:var(--g);color:var(--p)}.tlive-score.loss{background:var(--pk);color:#fff}.tlive-score.draw{background:#6c757d;color:#fff}
/* Pred card */
.pc{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:.5rem;margin-bottom:.35rem;position:relative}.pc.tb{border-color:rgba(245,166,35,.3)}
.tbg{background:linear-gradient(90deg,#f5a623,#e85a2a,var(--pk));color:#fff;font-size:.46rem;font-weight:800;padding:1px 5px;border-radius:10px;position:absolute;top:4px;right:4px}.tbg.auto{top:23px;background:linear-gradient(90deg,var(--cy),var(--g));color:var(--p)}
.pb{display:flex;border-radius:7px;overflow:hidden;height:19px;font-size:.5rem;font-weight:700;margin-bottom:.2rem}
.pb div{display:flex;align-items:center;justify-content:center;min-width:24px;color:#fff}.pbh{background:var(--g);color:var(--p)}.pbd{background:#6c757d}.pba{background:var(--cy);color:var(--p)}
.psc{text-align:center;font-size:.65rem;color:var(--tm)}.psc b{color:var(--tx)}
.adv{background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.2);border-radius:var(--rs);padding:.18rem .35rem;font-size:.55rem;color:#ffc107;display:flex;align-items:center;gap:.2rem;margin-top:.18rem;cursor:pointer}
.adv svg{width:10px;height:10px;fill:#ffc107;flex-shrink:0}
.adv .why{margin-left:auto;width:18px;height:18px;border-radius:50%;border:1.5px solid #f5a623;background:rgba(245,166,35,.12);color:#f5a623;display:flex;align-items:center;justify-content:center;font-size:.6rem;flex-shrink:0}
/* Best bets table */
.bb{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:.45rem;margin-top:.4rem}
.bb h5{font-size:.75rem;font-weight:700;margin-bottom:.25rem}
.bb table{width:100%;font-size:.52rem;border-collapse:collapse}
.bb th{background:var(--p);color:var(--tm);font-weight:600;padding:.2rem;border:none;text-align:left}
.bb td{padding:.18rem .2rem;border-bottom:1px solid var(--bd);vertical-align:middle}
.bb .sm{background:rgba(0,255,135,.08);font-weight:700}.bb .sm td{border:none}
.ok{color:var(--g);font-weight:700}.nk{color:var(--pk);font-weight:700}
/* Guess card */
.gc{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:.5rem;margin-bottom:.35rem;position:relative}
.gc.has{border-color:rgba(0,255,135,.2)}.gc.rok{border-left:3px solid var(--g)}.gc.rbad{border-left:3px solid var(--pk)}.gc.rex{border-left:3px solid gold}
.rb{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700}
.rb.rc{background:var(--g);color:var(--p)}.rb.rw{background:var(--pk);color:#fff}.rb.re{background:gold;color:var(--p)}
.wb{display:flex;gap:.2rem;margin:.25rem 0}
.wn{flex:1;border:2px solid var(--bd);background:transparent;color:var(--tm);font-size:.6rem;font-weight:600;padding:.25rem 0;border-radius:var(--rs);cursor:pointer;text-align:center}.wn:active{transform:scale(.97)}
.wn.sh{background:var(--g);color:var(--p);border-color:var(--g)}.wn.sd{background:#6c757d;color:#fff;border-color:#6c757d}.wn.sa{background:var(--cy);color:var(--p);border-color:var(--cy)}
.si{display:flex;align-items:center;justify-content:center;gap:.3rem}
.si input{width:38px;height:32px;text-align:center;border:2px solid var(--bd);background:rgba(255,255,255,.05);color:var(--tx);border-radius:var(--rs);font-size:.8rem;font-weight:800;outline:none}.si input:focus{border-color:var(--g)}
.act{text-align:center;font-size:.55rem;color:var(--tm);margin-top:.15rem}.act b{color:var(--tx)}
.psum{background:linear-gradient(135deg,rgba(0,255,135,.06),rgba(4,245,255,.04));border:1px solid rgba(0,255,135,.15);border-radius:var(--r);padding:.35rem;margin-bottom:.35rem;text-align:center;font-size:.65rem}.psum b{color:var(--g)}
.af-bar{display:flex;gap:.3rem;margin-bottom:.4rem}.af-btn{flex:1;padding:.45rem;border:2px solid var(--bd);background:rgba(255,255,255,.03);color:var(--tx);font-size:.7rem;font-weight:700;border-radius:var(--r);cursor:pointer;text-align:center;transition:all .2s}.af-btn:active{transform:scale(.95)}.af-ai{border-color:var(--cy);color:var(--cy);background:rgba(4,245,255,.08)}.af-rnd{border-color:var(--pk);color:var(--pk);background:rgba(233,0,82,.08)}
.locknote{background:rgba(247,201,72,.08);border:1px solid rgba(247,201,72,.18);border-radius:var(--rs);padding:.32rem .4rem;margin-top:.28rem;font-size:.55rem;color:var(--cy);line-height:1.45;text-align:center}
.rules{background:var(--cd);border:1px solid rgba(247,201,72,.22);border-radius:var(--r);padding:.5rem;margin-bottom:.5rem}
.rule-head{display:flex;align-items:center;justify-content:space-between;gap:.4rem;font-weight:800;font-size:.72rem;margin-bottom:.3rem}.rule-head span{font-size:.5rem;color:var(--tm);font-weight:700}
.rulegrid{display:grid;grid-template-columns:repeat(2,1fr);gap:.25rem}.rulepill{background:rgba(255,255,255,.045);border:1px solid var(--bd);border-radius:var(--rs);padding:.32rem;font-size:.55rem;line-height:1.35}.rulepill b{display:block;color:var(--cy);font-size:.66rem;margin-bottom:.04rem}.rulenote{font-size:.52rem;color:var(--tm);line-height:1.45;margin-top:.35rem}
/* You vs AI scoreboard */
.csb{display:flex;gap:.4rem;margin-bottom:.5rem}
.csc{flex:1;background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:.5rem;text-align:center}
.csc.win{border-color:var(--g);box-shadow:0 0 10px rgba(0,255,135,.1)}
.csc .cw{font-weight:700;font-size:.7rem;margin-bottom:.3rem}.csc .cp{font-size:1.4rem;font-weight:800}.csc .cd{font-size:.55rem;color:var(--tm);margin-top:.2rem}
/* Comparison match card */
.ccrd{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);padding:.45rem;margin-bottom:.3rem;font-size:.65rem}
.ccrd .cmatch{font-weight:700;margin-bottom:.3rem;display:flex;align-items:center;gap:3px}.cmatch img{width:14px;height:14px}
.cblk{margin-top:.3rem;padding-top:.3rem;border-top:1px solid var(--bd)}.cblk:first-of-type{margin-top:0;padding-top:0;border-top:none}
.cblk .cbt{font-size:.5rem;text-transform:uppercase;color:var(--tm);font-weight:700;margin-bottom:.2rem}
.crow{padding:.1rem 0;font-size:.6rem}.crow .cl{color:var(--tm);margin-right:.3rem;min-width:2rem;display:inline-block}
/* Compare teams */
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:.3rem;margin-bottom:.5rem}
.bpick{display:flex;flex-direction:column;align-items:center;gap:2px;padding:.3rem .1rem;border-radius:var(--rs);border:2px solid transparent;background:var(--cd);cursor:pointer}
.bpick img{width:28px;height:28px;object-fit:contain}.bpick span{font-size:.45rem;font-weight:600;color:var(--tm);text-align:center}
.bpick.s1{border-color:var(--g);background:rgba(0,255,135,.06)}.bpick.s1 span{color:var(--g)}
.bpick.s2{border-color:var(--cy);background:rgba(4,245,255,.06)}.bpick.s2 span{color:var(--cy)}
.csel{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.4rem;background:var(--cd);border-radius:var(--r);border:1px solid var(--bd);margin-bottom:.4rem}
.csel img{width:28px;height:28px;object-fit:contain}.csel .cn{font-weight:700;font-size:.75rem}
.vsbg{background:var(--pl);color:var(--g);font-weight:800;font-size:.65rem;padding:.2rem .5rem;border-radius:16px}
.sbar{display:flex;align-items:center;gap:.3rem;margin-bottom:.4rem;font-size:.65rem}
.sbar .sv{font-weight:700;min-width:24px;text-align:center}.sv.better{color:var(--g)}
.sbar .sl{font-size:.5rem;text-transform:uppercase;color:var(--tm);text-align:center;min-width:56px}
.sbar .sbc{flex:1;height:7px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.sbar .sb{height:100%;border-radius:3px}.sb.t1{background:var(--g);float:right}.sb.t2{background:var(--cy);float:left}
.fmr{display:flex;align-items:center;gap:.3rem;padding:.25rem 0;font-size:.6rem;border-bottom:1px solid var(--bd)}.fmr:last-child{border:none}
.fmr .fgl{color:var(--tm);font-size:.5rem;min-width:26px}
/* AI learning */
.aihero{background:linear-gradient(135deg,rgba(0,255,135,.08),rgba(4,245,255,.06));border:1px solid rgba(0,255,135,.16);border-radius:var(--r);padding:.75rem;margin-bottom:.45rem}
.airow{display:flex;align-items:center;justify-content:space-between;gap:.6rem}.ailabel{font-size:.5rem;color:var(--tm);text-transform:uppercase;font-weight:800;margin-bottom:.1rem}.ainum{font-size:2rem;font-weight:900;line-height:1;color:var(--g)}.aimeta{font-size:.52rem;color:var(--tm);margin-top:.18rem}
.aitrend{font-size:.62rem;font-weight:800;border-radius:999px;padding:.22rem .42rem;white-space:nowrap;background:rgba(255,255,255,.06);color:var(--tm)}.aitrend.up{color:var(--g);background:rgba(0,255,135,.09)}.aitrend.down{color:var(--pk);background:rgba(233,0,82,.09)}
.aimetrics{display:grid;grid-template-columns:repeat(3,1fr);gap:.3rem;margin-bottom:.45rem}.aimetric{background:var(--cd);border:1px solid var(--bd);border-radius:var(--rs);padding:.45rem;min-width:0}.aimetric span{display:block;font-size:.48rem;color:var(--tm);font-weight:800;text-transform:uppercase}.aimetric b{display:block;font-size:.86rem;margin:.12rem 0;white-space:nowrap}.aimetric em{display:block;font-style:normal;font-size:.48rem;color:var(--tm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

function trySync(server){
  if(D.arch)return;
  var local=gG();
  var phoneData={};var hasData=false;
  for(var gw in local){phoneData[gw]={};for(var mid in local[gw]){if(local[gw][mid].w){phoneData[gw][mid]=local[gw][mid];hasData=true}}}

var _rTmr=null,_cdTmr=null,_hasLive=false,_wasLive=false,_justEnded=0,_fid=0,_nxtIn=0;

function _mkPx(url){var e=encodeURIComponent(url);return[
  {u:url,w:false},
  {u:'https://api.codetabs.com/v1/proxy?quest='+e,w:false},
  {u:'https://api.allorigins.win/get?url='+e,w:true},
  {u:'https://corsproxy.io/?'+e,w:false},
  {u:'https://corsproxy.org/?'+e,w:false}
]}

function _validPxData(url,d){
  if(!d)return false;
  if(url.indexOf('api.fifa.com/api/v3/calendar/matches')>=0)return !!(d.Results&&d.Results.length!=null);
  if(url.indexOf('/scoreboard')>=0)return !!(d.events&&d.events.length!=null);
  if(url.indexOf('/standings')>=0)return !!(d.children||d.standings);
  if(url.indexOf('/fixtures/')>=0)return Array.isArray(d);
  return typeof d==='object';
}

function pxF(url,cb){
  var ps=_mkPx(url),done=false,pending=0;
  function win(d){if(done)return;done=true;cb(d)}
  function tryPx(p){
    pending++;
    var x=new XMLHttpRequest();
    x.open('GET',p.u,true);
    x.timeout=8000;
    x.onload=function(){
      if(done)return;
      if(x.status>=200&&x.status<300){
        try{
          var raw=JSON.parse(x.responseText);
          var d=p.w&&raw&&raw.contents?JSON.parse(raw.contents):raw;
          if(_validPxData(url,d)){win(d);return}
        }catch(e){}
      }
      pending--;if(!pending&&!done)win(null);
    };
    x.onerror=function(){pending--;if(!pending&&!done)win(null)};
    x.ontimeout=function(){pending--;if(!pending&&!done)win(null)};
    x.send();
  }
  for(var i=0;i<ps.length;i++)tryPx(ps[i]);
  setTimeout(function(){if(!done)win(null)},10000);
}

function fetchLive(){

function _fetchLeague(){
  if(D.arch)return;
  if(D.league==='pl')_fPL();
  else if(D.league==='wc'&&D.fx&&D.fx.some(function(f){return _matchIsDueOrLive(f,new Date())}))_fWCQuick();
  else if(D.league==='wc')_fWC();
  else _fLL();
}

function _rebuildGW(fix){
  var maxMd=0;fix.forEach(function(f){if(f.e>maxMd)maxMd=f.e});
  var gws=[];
  for(var md=1;md<=maxMd;md++){
    var mdf=fix.filter(function(f){return f.e===md});
    var allFin=mdf.length>0&&mdf.every(function(f){return f.fin});
    var isLive=mdf.some(function(f){return f.st&&!f.fin});
    gws.push({id:md,fin:allFin,cur:isLive});
  }
  if(!gws.some(function(g){return g.cur})){
    var todayId=dayForIsraelDate(fix,todayKeyIL());
    if(todayId)gws.forEach(function(g){g.cur=(g.id===todayId)});
    else{
      var lf=0;gws.forEach(function(g){if(g.fin&&g.id>lf)lf=g.id});
      gws.forEach(function(g){g.cur=(g.id===lf+1)});
      if(!gws.some(function(g){return g.cur}))gws.forEach(function(g){if(g.id===lf)g.cur=true});
    }
  }
  return gws;
}
function _todayKeyUTC(){return todayKeyIL().replace(/-/g,'')}
function _mergeTodayEvents(evts,todayData){
  evts=(evts||[]).slice();
  var today=(todayData&&todayData.events)||[];
  if(!today.length)return evts;
  var by={},seen={};
  today.forEach(function(ev){if(ev&&ev.id!=null)by[String(ev.id)]=ev});
  evts=evts.map(function(ev){var id=String(ev&&ev.id);seen[id]=true;return by[id]||ev});
  today.forEach(function(ev){var id=String(ev&&ev.id);if(id&&!seen[id])evts.push(ev)});
  return evts;
}

function _matchIsDueOrLive(f,now){
  if(!f||f.fin)return false;
  if(f.st&&!f.fin)return true;
  if(!f.ko)return false;
  var kt=new Date(f.ko).getTime();
  if(!isFinite(kt))return false;
  var diff=kt-now.getTime();
  return diff<=15*60000&&diff>-140*60000;
}

function _liveJsonNeedsFresh(liveSet,ageMs,now){
  if(!isFinite(ageMs)||ageMs<0)ageMs=999999;
  var hasLive=liveSet.some(function(f){return f.st&&!f.fin});
  var hasDue=liveSet.some(function(f){return _matchIsDueOrLive(f,now)});
  if(hasLive)return true;
  if(hasDue)return ageMs>30000;
  return ageMs>300000;
}

function _fLiveJson(){
  if(D.arch)return;
  _fid++;var fid=_fid;
  $('upd').textContent='\u21BB ...';
  var url='./live.json?t='+Date.now();
  var x=new XMLHttpRequest();
  x.open('GET',url,true);
  x.timeout=8000;
  x.onload=function(){
    if(fid!==_fid)return;
    if(x.status>=200&&x.status<300){
      try{
        var d=JSON.parse(x.responseText);
        if(d&&(d.fix||d.pl_seasons)){
          var now=new Date();
          var ageMs=d.ts?(Date.now()-new Date(d.ts).getTime()):0;
          var plPackForLive=d.pl_seasons&&D.plSeason?d.pl_seasons[D.plSeason]:null;
          var plLiveSet=plPackForLive&&plPackForLive.fix?plPackForLive.fix:((!D.plSeason||D.plSeason==="2025-26")?(d.fix||[]):[]);
          var llPackForLive=d.ll_seasons&&D.llSeason?d.ll_seasons[D.llSeason]:null;
          var llLiveSet=llPackForLive&&llPackForLive.fix?llPackForLive.fix:(D.llSeason===LL_SEASONS.current?(d.fix_ll||[]):[]);
          var liveSet=D.league==='wc'?(d.fix_wc||[]):D.league==='laliga'?llLiveSet:plLiveSet;
          var needsFresh=_liveJsonNeedsFresh(liveSet,ageMs,now)||_liveJsonNeedsFresh(D.fx||[],ageMs,now);
          function tryFresh(){if(needsFresh)setTimeout(_fetchLeague,80)}

          if(D.league==='pl'){
            var plPack=d.pl_seasons&&D.plSeason?d.pl_seasons[D.plSeason]:null;
            if(!plPack&&D.plSeason&&D.plSeason!=="2025-26"){_updDone(true);return;}
            var rawPL=plPack&&plPack.fix?plPack.fix:(d.fix||[]);
            var fix=[];
            var needFresh=false;
            rawPL.forEach(function(f){
              if(f.e==null)return;
              var st=f.st||false,fin=f.fin||false,mn=f.mn||0,ko=f.ko||'';
              if(st&&!fin&&ko){
                var el=Math.floor((now-new Date(ko))/60000);
                if(mn===0&&el>0)mn=el;
                if(el>115){
                  // Match should be over — if live.json score is missing, fetch fresh
                  if(f.hs==null||f.as==null){needFresh=true;return}
                  fin=true;mn=90;
                }
              }
              fix.push({id:f.id,e:f.e,h:f.h,a:f.a,hs:f.hs,as:f.as,fin:fin,st:st,ko:ko,mn:mn,sx:f.sx||''});
            });
            if(needFresh){_fPL();return;}
            var plGW=fix.length?_rebuildGW(fix):(plPack&&plPack.gws?plPack.gws:[]);
            _applyData('pl',D.tm||{},plGW,fix);_updDone(true);tryFresh();return;
          }

          var llPack=d.ll_seasons&&D.llSeason?d.ll_seasons[D.llSeason]:null;
          var rawLL=llPack&&llPack.fix?llPack.fix:(D.llSeason===LL_SEASONS.current?(d.fix_ll||[]):null);
          if(D.league==='laliga'&&rawLL&&!D.arch){
            var llFix=[];
            var needFreshLL=false;
            rawLL.forEach(function(f){
              var st=f.st||false,fin=f.fin||false,mn=f.mn||0,ko=f.ko||'';
              var llIdentity=llFixtureIdentity(f,D.llSeason||LL_SEASONS.current);
              if(st&&!fin&&ko){
                var el=Math.floor((now-new Date(ko))/60000);
                if(mn===0&&el>0)mn=el;
                if(el>115){
                  if(f.hs==null||f.as==null){needFreshLL=true;return}
                  fin=true;mn=90;
                }
              }
              llFix.push({id:llIdentity.id,source_fixture_id:llIdentity.source_fixture_id,season:llIdentity.season,e:f.e,h:f.h,a:f.a,hs:f.hs,as:f.as,fin:fin,st:st,ko:ko,mn:mn,sx:f.sx||''});
            });
            if(needFreshLL){_fLL();return;}
            var llGW=_rebuildGW(llFix);
            _applyData('laliga',D.tm||{},llGW,llFix);_updDone(true);tryFresh();return;
          }

          if(D.league==='wc'&&d.fix_wc){
            var wcFix=[];
            var needFreshWC=false;
            d.fix_wc.forEach(function(f){
              var st=f.st||false,fin=f.fin||false,mn=f.mn||0,ko=f.ko||'';
              if(st&&!fin&&ko){
                var el=Math.floor((now-new Date(ko))/60000);
                if(mn===0&&el>0)mn=el;
                if(el>130){
                  if(f.hs==null||f.as==null){needFreshWC=true;return}
                  fin=true;mn=90;
                }
              }
              wcFix.push({id:f.id,e:f.e,h:f.h,a:f.a,hs:f.hs,as:f.as,fin:fin,st:st,ko:ko,mn:mn,sx:f.sx||'',grp:f.grp||null});
            });
            if(needFreshWC){_fWC();return;}
            var wcGW=_rebuildGW(wcFix);
            _applyData('wc',D.tm||{},wcGW,wcFix);_updDone(true);tryFresh();return;
          }
        }
      }catch(e){}
    }
    _fetchLeague();
  };
  x.onerror=function(){_fetchLeague()};
  x.ontimeout=function(){_fetchLeague()};
  x.send();
}

function _getInterval(){
  if(_justEnded>0)return 15000;
  if(_hasLive)return 15000;
  return 300000;
}

function _startCountdown(){
  if(_cdTmr)clearInterval(_cdTmr);
  if(_hasLive)return;
  _nxtIn=Math.round(_getInterval()/1000);
  _cdTmr=setInterval(function(){
    _nxtIn--;
    if(_nxtIn<=0){clearInterval(_cdTmr);return}
    var u=$('upd');if(!u)return;
    var base=u.getAttribute('data-base')||u.innerHTML;
    if(!u.getAttribute('data-base'))u.setAttribute('data-base',u.innerHTML);
    u.innerHTML=base+' <span style="color:var(--tm);font-size:.5rem">('+_nxtIn+'s)</span>';
  },1000);
}

var _lastOk=0,_fetchFails=0;

function _updDone(ok){
  var prevLive=_hasLive;
  _hasLive=D.fx.some(function(f){return f.st&&!f.fin});
  if(prevLive&&!_hasLive){_justEnded=20;_wasLive=true}
  if(_justEnded>0)_justEnded--;
  var t=new Date().toLocaleTimeString();
  var u=$('upd');
  if(ok){
    _lastOk=Date.now();_fetchFails=0;
    if(_hasLive)u.innerHTML='<span style="color:#e90052;font-weight:800;font-size:.65rem;letter-spacing:.5px">● LIVE</span>';
    else u.innerHTML='<span style="color:#00ff87;font-size:.45rem">✓</span>';
  }else{
    _fetchFails++;
    if(_fetchFails>=3)u.innerHTML='<span style="color:#ff6b6b;font-size:.45rem" onclick="fetchLive()" title="Tap to retry">✗</span>';
    else u.innerHTML='<span style="color:#00ff87;font-size:.45rem">✓</span>';
  }
  u.removeAttribute('data-base');
  if(_rTmr)clearInterval(_rTmr);
  var iv=_fetchFails>=2?15000:_getInterval();
  _rTmr=setInterval(fetchLive,iv);
  _startCountdown();
}

function _applyData(lg,tm,gws,fix){
  if(D.arch&&D.league===lg)return;
  if(lg==="pl"&&D.plSeason&&PL_SEASONS&&PL_SEASONS.data){
    var raw=PL_SEASONS.data[D.plSeason]||{};
    raw.teams=tm;raw.gws=gws;raw.fix=fix;PL_SEASONS.data[D.plSeason]=raw;
    LDATA[lg]=normSeason(raw);
  }else if(lg==="laliga"&&D.llSeason&&LL_SEASONS&&LL_SEASONS.data){
    var rawLL=LL_SEASONS.data[D.llSeason]||{};
    if(rawLL.archive)return;
    rawLL.teams=tm;rawLL.gws=gws;rawLL.fix=fix;LL_SEASONS.data[D.llSeason]=rawLL;
    LDATA[lg]=normSeason(rawLL);
  }else{
    LDATA[lg]={tm:tm,gw:gws,fx:fix};
  }
  if(D.league!==lg)return;
  D.tm=tm;D.gw=gws;D.fx=fix;D.arch=!!(LDATA[lg]&&LDATA[lg].archive);_gMerged=false;
  var oSel=D.sel,oCur=D.cur;
  var cId=pickCurrentDay(gws,fix);setNextDay(cId,gws);
  D.cur=cId;D.sel=(oSel===oCur)?D.cur:oSel;
  bSt();rGW();render();
}

function _fPL(){
  if(D.arch)return;
  if(D.plSeason&&D.plSeason!=="2025-26"){
    var ld=seasonData("pl",D.plSeason);
    if(ld&&ld.fx){_applyData('pl',ld.tm,ld.gw,ld.fx);_updDone(true)}
    else _updDone(false);
    return;
  }
  _fid++;var fid=_fid;
  $('upd').textContent='\u21BB ...';
  pxF(FPLURL+'/fixtures/',function(fx){
    if(fid!==_fid)return;
    if(!fx||!fx.length){_updDone(false);return}

    var tm=D.tm||{};
    var gw=D.gw||[];

    var fix=[];
    var now=new Date();
    fx.forEach(function(f){
      if(f.event==null)return;
      var st=f.started||false,fin=f.finished||false,fp=f.finished_provisional||false;
      var mn=f.minutes||0,ko=f.kickoff_time||'';
      if(fp)fin=true;
      if(st&&!fin&&ko){
        var el=Math.floor((now-new Date(ko))/60000);
        if(mn===0&&el>0)mn=Math.max(0,el);
        if(el>115){fin=true;mn=90}
      }
      fix.push({id:f.id,e:f.event,h:f.team_h,a:f.team_a,
        hs:f.team_h_score,as:f.team_a_score,fin:fin,st:st,ko:ko,mn:mn,sx:''});
    });

    if(gw.length){
      var fxByGW={};fix.forEach(function(f){if(!fxByGW[f.e])fxByGW[f.e]=[];fxByGW[f.e].push(f)});
      var hasLive2=false;
      gw.forEach(function(g){
        var gf=fxByGW[g.id]||[];
        g.fin=gf.length>0&&gf.every(function(f){return f.fin});
        var isLive=gf.some(function(f){return f.st&&!f.fin});
        if(isLive){g.cur=true;hasLive2=true}
      });
      if(!hasLive2){
        var lf2=0;gw.forEach(function(g){if(g.fin&&g.id>lf2)lf2=g.id});
        gw.forEach(function(g){g.cur=(g.id===lf2+1)||(lf2===0&&g.id===1)});
        if(!gw.some(function(g){return g.cur}))gw.forEach(function(g){if(g.id===lf2)g.cur=true});
      }
    }

    _applyData('pl',tm,gw,fix);
    _updDone(true);
  });
}

function _fLL(){
  if(D.arch)return seasonData('laliga',D.llSeason);
  _fid++;var fid=_fid;
  $('upd').textContent='\u21BB ...';
  var season=D.llSeason||LL_SEASONS.current,parts=/^(\d{4})-\d{2}$/.exec(season);
  if(!parts){_updDone(false);return}
  var sy=+parts[1],dr=sy+'0801-'+(sy+1)+'0630';
  pxF(ESPNSB+'?dates='+dr+'&limit=1000',function(d){
    if(fid!==_fid)return;
    var evts=d?(d.events||null):null;
    if(!evts){_updDone(false);return}
    var tm=D.tm&&Object.keys(D.tm).length?D.tm:{};
    evts.sort(function(a,b){return(a.date||'').localeCompare(b.date||'')});
    evts.forEach(function(ev){
      (ev.competitions||[]).forEach(function(comp){
        (comp.competitors||[]).forEach(function(c){
          var ct=c.team||{};var ctid=+(ct.id||0);
          if(ctid&&!tm[ctid])tm[ctid]={id:ctid,n:ct.displayName||ct.name||'',s:ct.abbreviation||'???',
            c:ctid,b:ct.logo||'',sah:1100,sdh:1100,saa:1050,sda:1050};
        });
      });
    });
    var fix=[];

  var lgKey=D.league,isPL=lgKey==='pl',isWC=lgKey==='wc';
  var lgData=lh[lgKey]||{gw_results:[]};
  var selectedSeason=isPL
    ?(D.plSeason||lgData.current_season||'')
    :D.league==='laliga'
      ?(D.llSeason||lgData.current_season||'')
      :(lgData.current_season||'');
  var rows=learningRowsForSeason(normAIRows(lgData.gw_results||[]),selectedSeason);
  var canUseLocalRows=!D.arch&&selectedSeason===lgData.current_season;
  if(!rows.length&&canUseLocalRows){var localRows=normAIRows(localLearningRows());localRows.forEach(function(row){row.season=selectedSeason});rows=learningRowsForSeason(localRows,selectedSeason)}
  var overall=aiOverall(rows),tot=overall.total,acc=overall.accuracy_pct;
  var wts=activeWeights(),cal=activeCalibration(),modelState=learningModelState(lgKey),meta=(lgData.model_meta||modelState.meta||{});
  var modelCmp=isWC?lgData.model_comparison:(aiComparisonForSeason(lgData,selectedSeason,lgKey==='laliga')||(canUseLocalRows?localModelComparison():null));
  var emptyLaLigaArchive=lgKey==='laliga'&&D.arch&&!rows.length;
  var trainedMatches=aiStatusNumber(meta.trained_matches),verifiedSamples=aiVerifiedSamples(lgData.model_status);
  var hasOwnWeights=(trainedMatches!==null&&trainedMatches>0)||verifiedSamples>0;
  var lgCol=isPL?'var(--g)':isWC?'#f7c948':'#ff6b35';
  var gwLbl=isPL?'GW':isWC?'Day':'MD';
  var lgName=(isPL?'Premier League':isWC?'World Cup':'La Liga')+(selectedSeason?' '+selectedSeason:'');
  var focus=null;for(var fi=0;fi<rows.length;fi++){if(rows[fi].gw===D.sel){focus=rows[fi];break}}
  if(!focus&&rows.length)focus=rows[rows.length-1];
  function trendDelta(rs){
    if(rs.length<2)return null;
    var n=Math.min(2,rs.length),last=rs.slice(-n),prev=rs.slice(-(n*2),-n);
    if(!prev.length)return null;
    return last.reduce(function(s,r){return s+r.accuracy_pct},0)/n - prev.reduce(function(s,r){return s+r.accuracy_pct},0)/prev.length;
  }
  var delta=trendDelta(rows);
  var tSpan=delta===null?'<span class="aitrend">No trend yet</span>':'<span class="aitrend '+(delta>=0?'up':'down')+'">'+(delta>=0?'Up ':'Down ')+Math.abs(delta).toFixed(1)+'%</span>';
  var mainAcc=focus?focus.accuracy_pct:acc,focusName=focus?(focus.gw===D.sel?'Selected ':'Latest ')+gwLbl+focus.gw:'Overall';
  var h='<div class="sec" style="margin-bottom:.4rem">AI Learning Engine</div>';
  if(!emptyLaLigaArchive)h+='<div class="aihero"><div class="airow"><div><div class="ailabel">'+lgName+' '+focusName+' hit rate</div><div class="ainum" style="color:'+lgCol+'">'+mainAcc+'%</div><div class="aimeta">'+(focus?focus.correct_winner+'/'+focus.total+' games on this '+gwLbl.toLowerCase()+' · ':'')+'overall '+acc+'% ('+overall.correct_winner+'/'+tot+') · exact '+overall.score_acc_pct+'%</div></div>'+tSpan+'</div></div>';
  h+=aiModelStatus(lgData,modelCmp);
  h+='<div class="aisrc"><div><b>Data used</b><span>Completed matches before the selected '+gwLbl+', recent form, goals for/against, table/group position, clean sheets, draw tendency, head-to-head where available, and team strength ratings. For World Cup it also uses live tournament attack/defense, ESPN roster availability, manual absence overrides, points in the group, goal difference, and qualification pressure.</span></div>'+
    '<div><b>Score model</b><span>The engine estimates expected goals, runs a Poisson baseline, checks upset and draw value, then tests v4 against the learned history and uses it only when the backtest is better.</span></div>'+
    '<div><b>Learning state</b><span>'+(isWC?'Predictions are saved as pre-match snapshots. After the match, only newly checked snapshots train the model, so the same match is not learned repeatedly.':'After matches finish, the build recalculates accuracy, factor weights, and compares v4 against the previous expected-points score model.')+'</span></div></div>';
  if(isWC&&cal){
    h+='<div class="sec" style="margin-bottom:.25rem">Learning Adjustments</div><div class="aimetrics">';
    h+='<div class="aimetric"><span>Goal pace</span><b>'+Number(cal.goal_mult||1).toFixed(2)+'x</b><em>'+(meta.avg_pred_goals!=null?'pred '+meta.avg_pred_goals+' / actual '+meta.avg_actual_goals:'calibrates totals')+'</em></div>';
    h+='<div class="aimetric"><span>Draw bias</span><b>'+Number(cal.draw_bias||1).toFixed(2)+'x</b><em>'+(meta.pred_draw_rate!=null?'pred '+Math.round(meta.pred_draw_rate*100)+'% / actual '+Math.round(meta.actual_draw_rate*100)+'%':'calibrates draws')+'</em></div>';
    h+='<div class="aimetric"><span>0-0 guard</span><b>'+Number(cal.zero_zero_penalty||.62).toFixed(2)+'</b><em>'+(meta.trained_matches||0)+' trained snapshots</em></div>';
    h+='</div>';
  }
  if(!emptyLaLigaArchive)h+=aiModelComparison(modelCmp);
  if(rows.length){
    var last=rows[rows.length-1],best=rows.slice().sort(function(a,b){return b.accuracy_pct-a.accuracy_pct})[0],weak=rows.slice().sort(function(a,b){return a.accuracy_pct-b.accuracy_pct})[0];
    h+='<div class="aimetrics">';
    h+='<div class="aimetric"><span>'+(focus&&focus.gw===D.sel?'Selected':'Latest')+'</span><b>'+mainAcc+'%</b><em>'+(focus?gwLbl+focus.gw+' · '+focus.correct_winner+'/'+focus.total:'no games')+'</em></div>';
    h+='<div class="aimetric"><span>Exact score</span><b>'+overall.score_acc_pct+'%</b><em>'+overall.correct_score+'/'+tot+' exact results</em></div>';
    h+='<div class="aimetric"><span>Total points</span><b>'+(overall.points||0)+'</b><em>'+rows.length+' '+gwLbl.toLowerCase()+' rows</em></div>';
    h+='</div>';
    h+='<div class="aimetrics">';
    h+='<div class="aimetric"><span>Best '+gwLbl.toLowerCase()+'</span><b style="color:var(--g)">'+best.accuracy_pct+'%</b><em>'+gwLbl+best.gw+' · '+best.correct_winner+'/'+best.total+'</em></div>';
    h+='<div class="aimetric"><span>Weakest '+gwLbl.toLowerCase()+'</span><b style="color:var(--pk)">'+weak.accuracy_pct+'%</b><em>'+gwLbl+weak.gw+' · '+weak.correct_winner+'/'+weak.total+'</em></div>';
    h+='<div class="aimetric"><span>Overall</span><b>'+acc+'%</b><em>'+overall.correct_winner+'/'+tot+' winners</em></div>';
    h+='</div>';
    h+=aiTrendChart(rows,gwLbl,lgCol);
    h+=aiDayBreakdown(rows,gwLbl,lgCol);
  } else {
    h+=aiSeasonEmptyState(isPL?'Premier League':isWC?'World Cup':'La Liga',selectedSeason,D.arch,rows)||'<div class="emp" style="margin:1.2rem 0;line-height:1.7">No '+lgName+' data yet.<br><span style="font-size:.55rem;color:var(--tm)">Builds automatically after each completed gameweek.</span></div>';
  }
  if(Object.keys(wts).length){
    var ents=Object.entries(wts).sort(function(a,b){return b[1]-a[1]});
    var mxW=ents[0][1]||0.1;
    h+='<div class="sec" style="margin-bottom:.25rem">What Drives The Pick</div><div class="ainote">'+(hasOwnWeights?'Ranked by learned influence from past results.':'Base factor weights are shown until this league has enough completed learned rows.')+'</div><div class="ailist">';
    ents.slice(0,7).forEach(function(e,i){
      var pct=+(e[1]*100).toFixed(1),rel=e[1]/mxW,col=rel>.72?lgCol:rel>.45?'var(--cy)':'rgba(168,154,173,.8)',tone=rel>.72?'Strong signal':rel>.45?'Medium signal':'Small signal';
      h+='<div class="aiitem aifactor"><div class="aiitem-top"><div><b>'+(i+1)+'. '+(_aiFL[e[0]]||e[0])+'</b><small>'+tone+'</small></div><div class="aipct" style="color:'+col+'">'+pct+'%</div></div><div class="aibar"><div class="aifill" style="width:'+Math.max(5,Math.round(rel*100))+'%;background:'+col+'"></div></div></div>';
    });
    h+='</div>';
  }
  c.innerHTML=h;
  if(_aiChartAcc){_aiChartAcc.destroy();_aiChartAcc=null}
  if(_aiChartW){_aiChartW.destroy();_aiChartW=null}
}

init();
</script>
</body>
</html>
